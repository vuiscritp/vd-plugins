name: QuickTranslate-VN
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build Plugin
        run: |
          npx vd-cli build
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # Đẩy toàn bộ nội dung sau khi build
          branch: gh-pages
          clean: true
